<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Height AI Assistant</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='4' fill='%23000'/><text x='16' y='23' text-anchor='middle' font-family='sans-serif' font-weight='700' font-size='20' fill='%23fff'>H</text></svg>">
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f7f6f3;
      --surface: #ffffff;
      --border: #e4e2dd;
      --text: #1a1916;
      --text-muted: #9a9790;
      --accent: #1a1916;
      --accent-light: #f0ede8;
      --robot: #499281;
    }

    html, body {
      height: 100%;
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 1rem;
    }
    .app {
      display: flex;
      flex-direction: column;
      width: min(640px, 100%);
      height: 860px;
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      background: var(--surface);
    }
    @media (max-width: 660px) {
      body { padding: 0.5rem; }
      .app { height: calc(100dvh - 1rem); }
    }
    @media (max-width: 480px) {
      body { padding: 0; align-items: stretch; }
      .app { width: 100%; height: 100dvh; border-radius: 0; border: none; box-shadow: none; }
    }

    /* HEADER */
    .header {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 0.65rem;
      padding: 0.75rem 1.25rem;
      border-bottom: 1px solid var(--border);
      background: #499281;
    }
    .logo-wrap {
      width: 42px; height: 42px;
      border-radius: 50%;
      overflow: hidden;
      display: flex; align-items: center; justify-content: center;
      background: #ffffff;
      border: 1px solid #ffffff;
      flex-shrink: 0;
    }
    .logo-wrap img { width: 100%; height: 100%; object-fit: contain; display: block; }
    .restart-btn {
      margin-left: auto;
      background: transparent; border: none;
      width: 28px; height: 28px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      color: rgba(255,255,255,0.8); cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }
    .restart-btn:hover { background: rgba(255,255,255,0.15); color: #ffffff; }
    .restart-btn svg { width: 15px; height: 15px; }

    /* HERO */
    .hero {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
      padding: 1.75rem 1.25rem 1.25rem;
      background: var(--surface);
    }
    .hero-icon {
      width: 64px; height: 64px;
      background: var(--robot);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .hero-icon svg { width: 42px; height: 42px; }
    .hero-title { font-size: 1.15rem; font-weight: 500; color: var(--text); letter-spacing: -0.01em; margin-top: 0.2rem; }
    .hero-subtitle { font-size: 0.85rem; color: var(--text-muted); font-weight: 300; text-align: center; max-width: 280px; line-height: 1.5; }

    /* MESSAGES */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 1.5rem 1.25rem 1rem;
      display: flex;
      flex-direction: column;
      gap: 1.75rem;
      scroll-behavior: smooth;
    }
    .messages::-webkit-scrollbar { width: 4px; }
    .messages::-webkit-scrollbar-track { background: transparent; }
    .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .message-row {
      display: flex;
      gap: 1rem;
      width: 100%;
      animation: fadeUp 0.2s ease forwards;
      opacity: 0;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(5px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .avatar {
      width: 30px; height: 30px; border-radius: 50%;
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.6rem; font-weight: 500; margin-top: 2px;
    }
    .avatar.bot { background: #000000; }
    .avatar.bot svg { width: 18px; height: 18px; }

    .message-body { flex: 1; display: flex; flex-direction: column; gap: 0.65rem; }

    .bubble { font-size: 0.93rem; line-height: 1.7; color: var(--text); }
    .bubble.typing::after {
      content: '▋';
      display: inline-block;
      font-size: 0.78em;
      vertical-align: middle;
      margin-left: 1px;
      animation: blink 0.65s step-start infinite;
    }
    @keyframes blink { 50% { opacity: 0; } }

    /* FORM */
    .form-block { display: flex; flex-direction: column; gap: 0.75rem; margin-top: 0.25rem; }
    .field-wrap { display: flex; flex-direction: column; gap: 0.3rem; }
    .field-label { font-size: 0.88rem; color: #3a3834; font-weight: 500; }
    .field-label .req { color: #c0392b; margin-left: 2px; }

    input[type="text"], textarea {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.55rem 0.8rem;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.88rem;
      outline: none;
      transition: border-color 0.15s;
    }
    input[type="text"]:focus, textarea:focus { border-color: #aaa9a5; }
    textarea { resize: vertical; min-height: 68px; }
    select { border-color: var(--border); outline: none; }
    select:focus { border-color: #aaa9a5; outline: none; }

    .next-btn {
      background: #499281; color: #fff; border: none;
      border-radius: 999px; padding: 0.5rem 1.4rem;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.85rem; font-weight: 500;
      cursor: pointer; transition: opacity 0.15s;
      align-self: flex-start; margin-top: 0.15rem;
    }
    .next-btn:hover { opacity: 0.75; }
    .next-btn:disabled { opacity: 0.3; cursor: not-allowed; }

    /* OPTION BUTTONS */
    .buttons-row { display: flex; flex-wrap: wrap; gap: 0.4rem; }
    .option-btn {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 0.45rem 1rem;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.82rem;
      color: var(--text);
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }
    .option-btn:hover { background: var(--accent-light); border-color: #499281; }
    .option-btn:disabled { opacity: 0.35; cursor: default; pointer-events: none; }

    /* FILE UPLOAD */
    .drop-zone {
      border: 1px dashed var(--border);
      border-radius: 10px;
      padding: 0.65rem 0.9rem;
      display: flex; align-items: center; gap: 0.75rem;
      cursor: pointer;
      transition: all 0.18s;
      background: var(--bg);
      margin-top: 0.1rem;
    }
    .drop-zone:hover, .drop-zone.dragging { border-color: var(--accent); background: var(--accent-light); }
    .drop-zone.locked { pointer-events: none; opacity: 0.4; }
    .drop-zone-icon { color: var(--text-muted); flex-shrink: 0; }
    .drop-zone-text { display: flex; flex-direction: column; gap: 1px; }
    .drop-zone-label { font-size: 0.83rem; color: var(--text); font-weight: 400; }
    .drop-zone-sub { font-size: 0.72rem; color: var(--text-muted); }
    .drop-file-input { display: none; }
    .file-chosen {
      display: flex; align-items: center; gap: 0.5rem;
      background: var(--accent-light);
      border: 1px solid var(--border);
      border-radius: 8px; padding: 0.45rem 0.75rem;
      margin-top: 0.4rem; font-size: 0.8rem;
      color: var(--text); font-weight: 400;
    }
    .skip-btn {
      background: none; border: none; color: var(--text-muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.78rem; cursor: pointer;
      text-decoration: underline; text-underline-offset: 2px;
      padding: 0.2rem 0; margin-top: 0.3rem; display: inline-block;
    }
    .skip-btn:hover { color: var(--text); }
    .skip-btn:disabled { opacity: 0.3; cursor: default; pointer-events: none; }

    /* RESULT */
    .result-wrap {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0.85rem 0.85rem 2.6rem 0.85rem;
      font-family: 'DM Mono', monospace;
      font-size: 0.78rem; white-space: pre-wrap;
      color: var(--text); line-height: 1.75;
      margin-top: 0.4rem; position: relative;
    }
    .copy-btn {
      position: absolute; bottom: 8px; right: 8px;
      background: var(--surface); border: 1px solid var(--border);
      color: var(--text-muted); border-radius: 50%;
      width: 26px; height: 26px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.15s;
    }
    .copy-btn:hover { background: var(--accent-light); color: var(--text); }
    .copy-btn.ok { color: #499281; border-color: #499281; }

    /* TYPING DOTS */
    .typing-dots { display: flex; gap: 4px; align-items: center; padding: 4px 0; }
    .typing-dot { width: 5px; height: 5px; background: var(--text-muted); border-radius: 50%; animation: tdBounce 1.2s infinite; }
    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes tdBounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-4px)} }

    /* DRAG OVERLAY */
    #dragOverlay {
      display: none; position: fixed; inset: 0;
      background: rgba(240,237,232,0.75);
      border: 2px dashed var(--accent);
      z-index: 999; pointer-events: none;
      align-items: center; justify-content: center;
      flex-direction: column; gap: 0.6rem;
    }
    #dragOverlay.active { display: flex; }
    #dragOverlay p { font-size: 0.9rem; color: var(--accent); font-weight: 500; }

    /* FOOTER */
    .footer {
      flex-shrink: 0;
      padding: 0.75rem 1.25rem 1rem;
      background: var(--bg);
      border-top: 1px solid var(--border);
    }
    .powered-by-text {
      text-align: center;
      display: block;
      font-size: 0.68rem;
      color: var(--text-muted);
    }
    .powered-by-text a { color: #7a7874; text-decoration: none; }
    .powered-by-text a:hover { color: var(--text); text-decoration: underline; }

    .ended-note {
      text-align: center; color: var(--text-muted);
      font-size: 0.72rem; padding: 0.5rem 0;
      font-family: 'DM Mono', monospace;
    }
  </style>
</head>

<script>
const WEBHOOK_URL = 'https://hook.us1.make.com/431zm5huyqdtadg15wpiw5hmuyw5csiu';

let state = { formData: {}, files: {} };

const FILE_STEPS = [
  { key: 'rfp',           label: 'Upload the RFP' },
  { key: 'response_form', label: 'Upload the Response Form' },
  { key: 'specs',         label: 'Upload the specifications file' },
  { key: 'win_themes',    label: 'Upload the win themes file' },
  { key: 'style_guide',   label: 'Upload the writing style guide, if available' }
];

// Current file step index — only advanced inside advanceFileStep()
let fileStepIndex = 0;
// Guard to prevent double-firing from drag+input
let fileStepLocked = false;

let resultText = '';

const msgsEl    = () => document.getElementById('messages');
const scrollBot = () => setTimeout(function() { var m = msgsEl(); m.scrollTop = m.scrollHeight; }, 60);

/* ── ROBOT SVG ── */
function robotSVG() {
  return '<svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">'
    + '<line x1="32" y1="6" x2="32" y2="14" stroke="white" stroke-width="3" stroke-linecap="round"/>'
    + '<circle cx="32" cy="5" r="3" fill="white"/>'
    + '<rect x="14" y="14" width="36" height="26" rx="7" fill="white"/>'
    + '<circle cx="24" cy="25" r="4" fill="#499281"/>'
    + '<circle cx="40" cy="25" r="4" fill="#499281"/>'
    + '<circle cx="25.5" cy="23.5" r="1.2" fill="white"/>'
    + '<circle cx="41.5" cy="23.5" r="1.2" fill="white"/>'
    + '<path d="M24 33 Q32 38 40 33" stroke="#499281" stroke-width="2" stroke-linecap="round" fill="none"/>'
    + '<rect x="9" y="20" width="5" height="10" rx="2.5" fill="white"/>'
    + '<rect x="50" y="20" width="5" height="10" rx="2.5" fill="white"/>'
    + '</svg>';
}

/* ── ROW BUILDER ── */
function createRow(sender) {
  var row = document.createElement('div');
  row.className = 'message-row ' + sender;
  var av = document.createElement('div');
  av.className = 'avatar ' + sender;
  if (sender === 'bot') av.innerHTML = robotSVG();
  row.appendChild(av);
  var body = document.createElement('div');
  body.className = 'message-body';
  row.appendChild(body);
  msgsEl().appendChild(row);
  scrollBot();
  return body;
}

/* ── TYPEWRITER ── */
function typeText(text, body, speed) {
  speed = speed || 18;
  return new Promise(function(resolve) {
    var bubble = document.createElement('div');
    bubble.className = 'bubble typing';
    body.appendChild(bubble);
    scrollBot();
    var i = 0;
    var iv = setInterval(function() {
      bubble.textContent = text.slice(0, ++i);
      scrollBot();
      if (i >= text.length) {
        clearInterval(iv);
        bubble.classList.remove('typing');
        resolve(bubble);
      }
    }, speed);
  });
}

/* ── OPTION BUTTONS ── */
function addButtons(body, options, onSelect) {
  var row = document.createElement('div');
  row.className = 'buttons-row';
  options.forEach(function(opt) {
    var btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.textContent = opt;
    btn.onclick = function() {
      row.querySelectorAll('.option-btn').forEach(function(b) { b.disabled = true; });
      onSelect(opt);
    };
    row.appendChild(btn);
  });
  body.appendChild(row);
  scrollBot();
}

function botMsg(text, options, onSelect) {
  var body = createRow('bot');
  return typeText(text, body).then(function() {
    if (options && options.length) addButtons(body, options, onSelect);
    scrollBot();
    return body;
  });
}

/* ── TYPING DOTS ── */
var waitRow = null;
function showWaiting() {
  var body = createRow('bot');
  waitRow = body.parentElement;
  var dots = document.createElement('div');
  dots.className = 'typing-dots';
  dots.innerHTML = '<div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>';
  body.appendChild(dots); scrollBot();
}
function hideWaiting() { if (waitRow) { waitRow.remove(); waitRow = null; } }

/* ── DISABLE PAST INPUTS ── */
function disableForms() {
  msgsEl().querySelectorAll('input, textarea, select, .next-btn').forEach(function(el) { el.disabled = true; });
}

/* ============================================================
   INTRO
   ============================================================ */
function showIntro() {
  botMsg(
    "Kia ora. \uD83D\uDC4B\uD83C\uDFFE I'm your friendly AI prompt generator. Select the task you'd like a standard prompt for.",
    ['Bid Writing', 'Something Else'],
    handleTaskChoice
  );
}

function handleTaskChoice(choice) {
  if (choice === 'Bid Writing') {
    setTimeout(showStep1, 350);
  } else {
    setTimeout(function() {
      botMsg("Thanks for stopping by. We'll have more options available soon. \uD83D\uDC4B\uD83C\uDFFE").then(function() {
        var note = document.createElement('div');
        note.className = 'ended-note'; note.textContent = '— chat ended —';
        msgsEl().appendChild(note); scrollBot();
      });
    }, 300);
  }
}

/* ============================================================
   STEP 1 — Core project details
   ============================================================ */
function showStep1() {
  var body = createRow('bot');
  typeText("Let's start with the bid's main details.", body).then(function() {
    var form = document.createElement('div');
    form.className = 'form-block';
    form.innerHTML =
      '<div class="field-wrap">'
        + '<label class="field-label">Our client name <span class="req">*</span></label>'
        + '<input type="text" id="f_our_client">'
      + '</div>'
      + '<div class="field-wrap">'
        + '<label class="field-label">Their client name <span class="req">*</span></label>'
        + '<input type="text" id="f_their_client">'
      + '</div>'
      + '<div class="field-wrap">'
        + '<label class="field-label">Project title <span class="req">*</span></label>'
        + '<input type="text" id="f_project_title">'
      + '</div>'
      + '<button class="next-btn" onclick="submitStep1()">Next</button>';
    body.appendChild(form);
    scrollBot();
  });
}

function submitStep1() {
  var g = function(id) { var el = document.getElementById(id); return el ? el.value.trim() : ''; };
  var req = [
    { id: 'f_our_client',    label: 'Our client name' },
    { id: 'f_their_client',  label: 'Their client name' },
    { id: 'f_project_title', label: 'Project title' }
  ];
  for (var r of req) {
    if (!g(r.id)) { alert('Please fill in: ' + r.label); document.getElementById(r.id).focus(); return; }
  }
  Object.assign(state.formData, {
    our_client_name:   g('f_our_client'),
    their_client_name: g('f_their_client'),
    project_title:     g('f_project_title')
  });
  disableForms();
  setTimeout(showStep2, 350);
}

/* ============================================================
   STEP 2 — Response focus
   ============================================================ */
function showStep2() {
  var body = createRow('bot');
  typeText("Great. Now let's add the response focus.", body).then(function() {
    var form = document.createElement('div');
    form.className = 'form-block';
    form.innerHTML =
      '<div class="field-wrap">'
        + '<label class="field-label">What have you been tasked to support? e.g., Executive Summary, Case Studies, CVs or a particular response schedule</label>'
        + '<textarea id="f_non_price"></textarea>'
      + '</div>'
      + '<div class="field-wrap">'
        + '<label class="field-label">What subject matter expertise should the writing assistant have? e.g., Road maintenance, bridge engineer</label>'
        + '<textarea id="f_sme"></textarea>'
      + '</div>'
      + '<div class="field-wrap">'
        + '<label class="field-label">Evaluation criteria (leave blank to use standard criteria)</label>'
        + '<textarea id="f_eval_criteria"></textarea>'
      + '</div>'
      + '<div class="field-wrap">'
        + '<label class="field-label">English variant</label>'
        + '<select id="f_english_variant" style="width:100%;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:0.55rem 0.8rem;color:var(--text);font-family:\'DM Sans\',sans-serif;font-size:0.88rem;outline:none;appearance:none;cursor:pointer;">'
          + '<option value="">Select one...</option>'
          + '<option value="New Zealand English">New Zealand English</option>'
          + '<option value="Australian English">Australian English</option>'
        + '</select>'
      + '</div>'

function submitStep2() {
  var g = function(id) { var el = document.getElementById(id); return el ? el.value : ''; };
  Object.assign(state.formData, {
    non_price_attributes:     g('f_non_price'),
    subject_matter_expertise: g('f_sme'),
    evaluation_criteria:      g('f_eval_criteria'),
    english_variant:          g('f_english_variant')
  });
  disableForms();
  setTimeout(startFileUploads, 350);

/* ============================================================
   FILE UPLOADS
   ============================================================ */
function startFileUploads() {
  fileStepIndex = 0;
  fileStepLocked = false;
  botMsg("Now upload the reference files. You can drag & drop them or click to upload. Select skip for the ones you don't have.").then(function() {
    setTimeout(function() { askForFile(0); }, 300);
  });
}

function askForFile(idx) {
  if (idx >= FILE_STEPS.length) {
    showSubmitButton();
    return;
  }

  var step  = FILE_STEPS[idx];
  var key   = step.key;
  var label = step.label;
  var num   = idx + 1;
  var total = FILE_STEPS.length;

  var body = createRow('bot');
  typeText(label, body).then(function() {
    var sub = document.createElement('div');
    sub.style.cssText = 'font-size:0.72rem;color:var(--text-muted);margin-top:-0.4rem;font-family:"DM Mono",monospace;';
    sub.textContent = num + ' of ' + total;
    body.appendChild(sub);

    // Hidden file input — no onchange inline to avoid double-fire with drag
    var fileInput = document.createElement('input');
    fileInput.type = 'file';
    fileInput.className = 'drop-file-input';
    fileInput.id = 'fi_' + key;

    // Drop zone
    var dz = document.createElement('div');
    dz.className = 'drop-zone';
    dz.id = 'dz_' + key;
    dz.innerHTML =
        '<div class="drop-zone-icon">'
          + '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">'
            + '<path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>'
            + '<polyline points="17 8 12 3 7 8"/>'
            + '<line x1="12" y1="3" x2="12" y2="15"/>'
          + '</svg>'
        + '</div>'
        + '<div class="drop-zone-text">'
          + '<span class="drop-zone-label">Drag &amp; drop or click to upload</span>'
          + '<span class="drop-zone-sub">' + num + ' of ' + total + '</span>'
        + '</div>';

    // Click to open file picker
    dz.addEventListener('click', function() {
      fileInput.click();
    });

    // File input change (click-to-upload path)
    fileInput.addEventListener('change', function() {
      var f = fileInput.files && fileInput.files[0];
      if (f) acceptFile(key, f.name);
    });

    // Drag-and-drop events on the drop zone
    dz.addEventListener('dragover', function(e) {
      e.preventDefault();
      e.stopPropagation();
      dz.classList.add('dragging');
    });
    dz.addEventListener('dragleave', function(e) {
      e.stopPropagation();
      dz.classList.remove('dragging');
    });
    dz.addEventListener('drop', function(e) {
      e.preventDefault();
      e.stopPropagation();
      dz.classList.remove('dragging');
      var f = e.dataTransfer.files && e.dataTransfer.files[0];
      if (f) acceptFile(key, f.name);
    });

    // Selected file indicator
    var selDiv = document.createElement('div');
    selDiv.id = 'file_selected_' + key;

    // Skip button
    var skipBtn = document.createElement('button');
    skipBtn.className = 'skip-btn';
    skipBtn.id = 'skip_' + key;
    skipBtn.textContent = 'Skip';
    skipBtn.addEventListener('click', function() {
      skipFile(key);
    });

    body.appendChild(fileInput);
    body.appendChild(dz);
    body.appendChild(selDiv);
    body.appendChild(skipBtn);
    scrollBot();
  });
}

/* Called when a file is chosen (via click or drag) */
function acceptFile(key, filename) {
  // Guard: only accept once per step
  if (fileStepLocked) return;
  fileStepLocked = true;

  state.files[key] = filename;

  var sel = document.getElementById('file_selected_' + key);
  if (sel) {
    sel.innerHTML =
      '<div class="file-chosen">'
        + '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>'
        + filename
      + '</div>';
  }

  lockCurrentStep(key);
  advanceFileStep();
}

/* Called when the user clicks Skip */
function skipFile(key) {
  if (fileStepLocked) return;
  fileStepLocked = true;

  state.files[key] = '';
  lockCurrentStep(key);
  advanceFileStep();
}

/* Disable the drop zone and skip button for a completed step */
function lockCurrentStep(key) {
  var dz = document.getElementById('dz_' + key);
  if (dz) dz.classList.add('locked');

  var sk = document.getElementById('skip_' + key);
  if (sk) sk.disabled = true;
}

/* Move to the next file step */
function advanceFileStep() {
  fileStepIndex++;
  fileStepLocked = false;           // reset lock for the next step
  setTimeout(function() { askForFile(fileStepIndex); }, 480);
}

/* ============================================================
   SUBMIT BUTTON (shown after all file prompts)
   ============================================================ */
function showSubmitButton() {
  var body = createRow('bot');
  typeText('All done! Generate your prompt.', body).then(function() {
    var btn = document.createElement('button');
    btn.className = 'next-btn';
    btn.textContent = 'Submit';
    btn.addEventListener('click', function() {
      btn.disabled = true;
      sendToWebhook();
    });
    body.appendChild(btn);
    scrollBot();
  });
}

/* ============================================================
   GLOBAL DRAG OVERLAY (entire window)
   ============================================================ */
var dragCtr = 0;
document.addEventListener('dragenter', function(e) {
  if (e.dataTransfer && e.dataTransfer.types && e.dataTransfer.types.includes('Files')) {
    dragCtr++;
    document.getElementById('dragOverlay').classList.add('active');
  }
});
document.addEventListener('dragleave', function() {
  dragCtr--;
  if (dragCtr <= 0) { dragCtr = 0; document.getElementById('dragOverlay').classList.remove('active'); }
});
document.addEventListener('drop', function(e) {
  dragCtr = 0;
  document.getElementById('dragOverlay').classList.remove('active');
  // Don't prevent default here — individual drop zones handle their own drops
});
document.addEventListener('dragover', function(e) { e.preventDefault(); });

/* ============================================================
   WEBHOOK
   ============================================================ */
function sendToWebhook() {
  botMsg('Creating prompt… \u23F3').then(function() {
    showWaiting();
    var payload = Object.assign({}, state.formData, {
      rfp_filename:            state.files['rfp']           || '',
      response_form_filename:  state.files['response_form'] || '',
      specifications_filename: state.files['specs']         || '',
      win_themes_filename:     state.files['win_themes']    || '',
      style_guide_filename:    state.files['style_guide']   || ''
    });
    fetch(WEBHOOK_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    })
    .then(function(res) { return res.text(); })
    .then(function(text) {
      hideWaiting();
      resultText = text;
      showResult(text);
    })
    .catch(function() {
      hideWaiting();
      botMsg('Something went wrong. Please try again.');
    });
  });
}

/* ============================================================
   RESULT
   ============================================================ */
function showResult(text) {
  var body = createRow('bot');

  var intro = document.createElement('div');
  intro.className = 'bubble';
  intro.textContent = "Here\u2019s your standard prompt";
  body.appendChild(intro);

  var wrap = document.createElement('div');
  wrap.className = 'result-wrap';

  var copyBtn = document.createElement('button');
  copyBtn.className = 'copy-btn';
  copyBtn.title = 'Copy to clipboard';
  copyBtn.innerHTML = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>';
  copyBtn.addEventListener('click', function() {
    navigator.clipboard.writeText(resultText).then(function() {
      copyBtn.classList.add('ok');
      copyBtn.innerHTML = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>';
      setTimeout(function() {
        copyBtn.classList.remove('ok');
        copyBtn.innerHTML = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>';
      }, 2000);
    });
  });

  var content = document.createElement('div');
  content.textContent = text;

  wrap.appendChild(copyBtn);
  wrap.appendChild(content);
  body.appendChild(wrap);
  scrollBot();
  setTimeout(askRestart, 700);
}

/* ============================================================
   RESTART
   ============================================================ */
function askRestart() {
  botMsg("Like to start over?", ['Yes, start over', "No, I'm done"], handleRestart);
}

function handleRestart(choice) {
  if (choice === 'Yes, start over') {
    setTimeout(function() {
      botMsg("Sure! Let\u2019s go again.").then(function() { setTimeout(showIntro, 450); });
    }, 300);
  } else {
    setTimeout(function() {
      botMsg("Ok, bye. \uD83D\uDC4B\uD83C\uDFFE").then(function() {
        var note = document.createElement('div');
        note.className = 'ended-note'; note.textContent = '\u2014 chat ended \u2014';
        msgsEl().appendChild(note); scrollBot();
      });
    }, 300);
  }
}

/* ============================================================
   BOOT
   ============================================================ */
var HERO_HTML = '';

function restartChat() {
  state = { formData: {}, files: {} };
  fileStepIndex = 0;
  fileStepLocked = false;
  resultText = '';
  msgsEl().innerHTML = HERO_HTML;
  setTimeout(showIntro, 400);
}

window.addEventListener('DOMContentLoaded', function() {
  HERO_HTML = document.getElementById('heroSection').outerHTML;
  setTimeout(showIntro, 600);
});
</script>
