<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes" />
  <title>Height AI Assistant · Prompt Generator</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%%23000000'/%3E%3Ctext x='16' y='23' text-anchor='middle' font-family='sans-serif' font-weight='700' font-size='20' fill='%23fff'%3EH%3C/text%3E%3C/svg%3E">
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f7f6f3;
      --surface: #ffffff;
      --border: #e4e2dd;
      --text: #1a1916;
      --text-muted: #9a9790;
      --accent: #1a1916;
      --accent-light: #f0ede8;
      --robot: #499281;
    }

    html, body {
      height: 100%;
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem 1rem;
    }
    .app {
      display: flex;
      flex-direction: column;
      width: min(640px, 100%);
      height: min(860px, calc(100dvh - 4rem));
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      background: var(--surface);
    }
    @media (max-width: 660px) {
      body { padding: 1rem 0.5rem; }
      .app { height: calc(100dvh - 2rem); }
    }
    @media (max-width: 480px) {
      body { padding: 0; align-items: stretch; }
      .app { width: 100%; height: 100dvh; border-radius: 0; border: none; box-shadow: none; }
    }

    .header {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 0.65rem;
      padding: 0.75rem 1.25rem;
      border-bottom: 1px solid var(--border);
      background: #ffffff;
    }
    .logo-wrap {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #ffffff;
      border: 1px solid #ffffff;
      flex-shrink: 0;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }
    .logo-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .restart-btn {
      margin-left: auto;
      background: transparent;
      border: none;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }
    .restart-btn:hover {
      background: var(--accent-light);
      color: var(--text);
    }
    .restart-btn svg {
      width: 16px;
      height: 16px;
    }

    .hero {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
      padding: 1.75rem 1.25rem 1.25rem;
      background: var(--surface);
    }
    .hero-icon {
      width: 64px;
      height: 64px;
      background: var(--robot);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .hero-icon svg {
      width: 42px;
      height: 42px;
    }
    .hero-title {
      font-size: 1.15rem;
      font-weight: 500;
      color: var(--text);
      letter-spacing: -0.01em;
      margin-top: 0.2rem;
    }
    .hero-subtitle {
      font-size: 0.85rem;
      color: var(--text-muted);
      font-weight: 300;
      text-align: center;
      max-width: 280px;
      line-height: 1.5;
    }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 1.5rem 1.25rem 1rem;
      display: flex;
      flex-direction: column;
      gap: 1.75rem;
      scroll-behavior: smooth;
    }
    .messages::-webkit-scrollbar {
      width: 4px;
    }
    .messages::-webkit-scrollbar-track {
      background: transparent;
    }
    .messages::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 2px;
    }

    .message-row {
      display: flex;
      gap: 1rem;
      width: 100%;
      animation: fadeUp 0.2s ease forwards;
      opacity: 0;
    }
    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(5px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .avatar {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.6rem;
      font-weight: 500;
      margin-top: 2px;
    }
    .avatar.bot {
      background: #000000;
    }
    .avatar.bot svg {
      width: 18px;
      height: 18px;
    }

    .message-body {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 0.65rem;
    }

    .bubble {
      font-size: 0.93rem;
      line-height: 1.7;
      color: var(--text);
    }
    .bubble.typing::after {
      content: '▋';
      display: inline-block;
      font-size: 0.78em;
      vertical-align: middle;
      margin-left: 1px;
      animation: blink 0.65s step-start infinite;
    }
    @keyframes blink {
      50% {
        opacity: 0;
      }
    }

    .form-block {
      display: flex;
      flex-direction: column;
      gap: 0.9rem;
      margin-top: 0.25rem;
    }
    .field-wrap {
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
    }
    .field-label {
      font-size: 0.88rem;
      color: #3a3834;
      font-weight: 500;
    }
    .field-label .req {
      color: #c0392b;
      margin-left: 2px;
    }

    input[type="text"],
    textarea,
    select {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.6rem 0.8rem;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.88rem;
      outline: none;
      transition: border-color 0.15s;
    }
    input[type="text"]:focus,
    textarea:focus,
    select:focus {
      border-color: #aaa9a5;
    }
    textarea {
      resize: vertical;
      min-height: 72px;
    }

    .next-btn {
      background: #499281;
      color: #fff;
      border: none;
      border-radius: 999px;
      padding: 0.5rem 1.6rem;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.05s;
      align-self: flex-start;
      margin-top: 0.15rem;
    }
    .next-btn:hover {
      opacity: 0.8;
      transform: scale(0.98);
    }
    .next-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      transform: none;
    }

    .buttons-row {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-top: 0.2rem;
    }
    .option-btn {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 0.45rem 1rem;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.82rem;
      color: var(--text);
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }
    .option-btn:hover {
      background: var(--accent-light);
      border-color: #499281;
    }
    .option-btn:disabled {
      opacity: 0.35;
      cursor: default;
      pointer-events: none;
    }

    .drop-zone {
      border: 1px dashed var(--border);
      border-radius: 10px;
      padding: 0.7rem 0.9rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      cursor: pointer;
      transition: all 0.18s;
      background: var(--bg);
      margin-top: 0.1rem;
    }
    .drop-zone:hover,
    .drop-zone.dragging {
      border-color: var(--accent);
      background: var(--accent-light);
    }
    .drop-zone.locked {
      pointer-events: none;
      opacity: 0.45;
      filter: grayscale(0.05);
    }
    .drop-zone-icon {
      color: var(--text-muted);
      flex-shrink: 0;
    }
    .drop-zone-text {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .drop-zone-label {
      font-size: 0.83rem;
      color: var(--text);
      font-weight: 500;
    }
    .drop-zone-sub {
      font-size: 0.7rem;
      color: var(--text-muted);
    }
    .drop-file-input {
      display: none;
    }
    .file-chosen {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      background: var(--accent-light);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.4rem 0.75rem;
      margin-top: 0.5rem;
      font-size: 0.8rem;
      color: var(--text);
      font-weight: 400;
    }
    .skip-btn {
      background: none;
      border: none;
      color: var(--text-muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.78rem;
      cursor: pointer;
      text-decoration: underline;
      text-underline-offset: 3px;
      padding: 0.2rem 0;
      margin-top: 0.35rem;
      display: inline-block;
      width: fit-content;
    }
    .skip-btn:hover {
      color: var(--text);
    }
    .skip-btn:disabled {
      opacity: 0.35;
      cursor: default;
      pointer-events: none;
    }

    .result-wrap {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0.85rem 0.85rem 2.6rem 0.85rem;
      font-family: 'DM Mono', monospace;
      font-size: 0.78rem;
      white-space: pre-wrap;
      color: var(--text);
      line-height: 1.75;
      margin-top: 0.4rem;
      position: relative;
    }
    .copy-btn {
      position: absolute;
      bottom: 8px;
      right: 8px;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text-muted);
      border-radius: 50%;
      width: 28px;
      height: 28px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
    }
    .copy-btn:hover {
      background: var(--accent-light);
      color: var(--text);
    }
    .copy-btn.ok {
      color: #499281;
      border-color: #499281;
    }

    .typing-dots {
      display: flex;
      gap: 5px;
      align-items: center;
      padding: 4px 0;
    }
    .typing-dot {
      width: 6px;
      height: 6px;
      background: var(--text-muted);
      border-radius: 50%;
      animation: tdBounce 1.2s infinite;
    }
    .typing-dot:nth-child(2) {
      animation-delay: 0.2s;
    }
    .typing-dot:nth-child(3) {
      animation-delay: 0.4s;
    }
    @keyframes tdBounce {
      0%, 60%, 100% {
        transform: translateY(0);
      }
      30% {
        transform: translateY(-5px);
      }
    }

    #dragOverlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(240, 237, 232, 0.85);
      border: 2px dashed var(--accent);
      z-index: 999;
      pointer-events: none;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 0.6rem;
    }
    #dragOverlay.active {
      display: flex;
    }
    #dragOverlay p {
      font-size: 0.9rem;
      color: var(--accent);
      font-weight: 500;
    }

    .footer {
      flex-shrink: 0;
      padding: 0.75rem 1.25rem 1rem;
      background: var(--bg);
      border-top: 1px solid var(--border);
    }
    .powered-by-text {
      text-align: center;
      display: block;
      font-size: 0.68rem;
      color: var(--text-muted);
    }
    .powered-by-text a {
      color: #7a7874;
      text-decoration: none;
    }
    .powered-by-text a:hover {
      color: var(--text);
      text-decoration: underline;
    }

    .ended-note {
      text-align: center;
      color: var(--text-muted);
      font-size: 0.72rem;
      padding: 0.5rem 0;
      font-family: 'DM Mono', monospace;
    }
  </style>
</head>
<body>

<div id="dragOverlay">
  <svg width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="#1a1916" stroke-width="1.5">
    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
    <polyline points="17 8 12 3 7 8"/>
    <line x1="12" y1="3" x2="12" y2="15"/>
  </svg>
  <p>Drop your file here</p>
</div>

<div class="app">
  <header class="header">
    <div class="logo-wrap">
      <img src="https://raw.githubusercontent.com/somethingsomethingdigital/height-assistant/1f1de1570a5bc80fec1990baff9456064e60af26/height_logo.png" alt="Height">
    </div>
    <button class="restart-btn" id="globalRestartBtn" title="Restart session">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
        <path d="M3 3v5h5"/>
      </svg>
    </button>
  </header>

  <div class="messages" id="messages">
    <div class="hero" id="heroSection">
      <div class="hero-icon">
        <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
          <line x1="32" y1="6" x2="32" y2="14" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
          <circle cx="32" cy="5" r="2.5" fill="white"/>
          <rect x="14" y="14" width="36" height="26" rx="7" fill="white"/>
          <circle cx="24" cy="25" r="4" fill="#499281"/>
          <circle cx="40" cy="25" r="4" fill="#499281"/>
          <circle cx="25.5" cy="23.5" r="1.2" fill="white"/>
          <circle cx="41.5" cy="23.5" r="1.2" fill="white"/>
          <path d="M24 33 Q32 38 40 33" stroke="#499281" stroke-width="2" stroke-linecap="round" fill="none"/>
          <rect x="9" y="20" width="5" height="10" rx="2.5" fill="white"/>
          <rect x="50" y="20" width="5" height="10" rx="2.5" fill="white"/>
          <rect x="20" y="42" width="24" height="16" rx="5" fill="white" opacity="0.85"/>
          <circle cx="27" cy="50" r="2.5" fill="#499281" opacity="0.5"/>
          <circle cx="37" cy="50" r="2.5" fill="#499281" opacity="0.5"/>
        </svg>
      </div>
      <span class="hero-title">Height AI Assistant</span>
      <span class="hero-subtitle">Provide information about your bid to receive a standard AI prompt for use in ChatGPT projects.</span>
    </div>
  </div>

  <footer class="footer">
    <span class="powered-by-text">Powered by <a href="https://www.somethingsomething.digital" target="_blank" rel="noopener">Something Something Digital</a></span>
  </footer>
</div>

<script>
const WEBHOOK_URL = 'https://hook.us1.make.com/431zm5huyqdtadg15wpiw5hmuyw5csiu';

let state = { formData: {}, files: {} };

const FILE_STEPS = [
  { key: 'rfp',           label: 'Upload the RFP' },
  { key: 'response_form', label: 'Upload the Response Form' },
  { key: 'specs',         label: 'Upload the specifications file' },
  { key: 'win_themes',    label: 'Upload the win themes file' },
  { key: 'style_guide',   label: 'Upload the writing style guide, if available' }
];

let fileStepIndex = 0;
let fileStepLocked = false;
let resultText = '';
let activeConversation = true;

const msgsEl = () => document.getElementById('messages');
const scrollBot = () => setTimeout(() => { const m = msgsEl(); m.scrollTop = m.scrollHeight; }, 70);

function robotSVG() {
  return '<svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">'
    + '<line x1="32" y1="6" x2="32" y2="14" stroke="white" stroke-width="3" stroke-linecap="round"/>'
    + '<circle cx="32" cy="5" r="3" fill="white"/>'
    + '<rect x="14" y="14" width="36" height="26" rx="7" fill="white"/>'
    + '<circle cx="24" cy="25" r="4" fill="#499281"/>'
    + '<circle cx="40" cy="25" r="4" fill="#499281"/>'
    + '<circle cx="25.5" cy="23.5" r="1.2" fill="white"/>'
    + '<circle cx="41.5" cy="23.5" r="1.2" fill="white"/>'
    + '<path d="M24 33 Q32 38 40 33" stroke="#499281" stroke-width="2" stroke-linecap="round" fill="none"/>'
    + '<rect x="9" y="20" width="5" height="10" rx="2.5" fill="white"/>'
    + '<rect x="50" y="20" width="5" height="10" rx="2.5" fill="white"/>'
    + '</svg>';
}

function createRow(sender) {
  const row = document.createElement('div');
  row.className = `message-row ${sender}`;
  const av = document.createElement('div');
  av.className = `avatar ${sender}`;
  if (sender === 'bot') av.innerHTML = robotSVG();
  row.appendChild(av);
  const body = document.createElement('div');
  body.className = 'message-body';
  row.appendChild(body);
  msgsEl().appendChild(row);
  scrollBot();
  return body;
}

function typeText(text, body, speed = 18) {
  return new Promise(resolve => {
    const bubble = document.createElement('div');
    bubble.className = 'bubble typing';
    body.appendChild(bubble);
    scrollBot();
    let i = 0;
    const iv = setInterval(() => {
      bubble.textContent = text.slice(0, ++i);
      scrollBot();
      if (i >= text.length) {
        clearInterval(iv);
        bubble.classList.remove('typing');
        resolve(bubble);
      }
    }, speed);
  });
}

function addButtons(body, options, onSelect) {
  const row = document.createElement('div');
  row.className = 'buttons-row';
  options.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.textContent = opt;
    btn.onclick = () => {
      if (!activeConversation) return;
      row.querySelectorAll('.option-btn').forEach(b => b.disabled = true);
      onSelect(opt);
    };
    row.appendChild(btn);
  });
  body.appendChild(row);
  scrollBot();
}

function botMsg(text, options = null, onSelect = null) {
  if (!activeConversation) return Promise.resolve(null);
  const body = createRow('bot');
  return typeText(text, body).then(() => {
    if (options && onSelect) addButtons(body, options, onSelect);
    scrollBot();
    return body;
  });
}

let waitRow = null;
function showWaiting() {
  if (!activeConversation) return;
  const body = createRow('bot');
  waitRow = body.parentElement;
  const dots = document.createElement('div');
  dots.className = 'typing-dots';
  dots.innerHTML = '<div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>';
  body.appendChild(dots);
  scrollBot();
}
function hideWaiting() { if (waitRow) { waitRow.remove(); waitRow = null; } }

function disableForms() {
  msgsEl().querySelectorAll('input, textarea, select, .next-btn, .skip-btn').forEach(el => { if (el) el.disabled = true; });
}

function fullResetAndRestart() {
  if (!activeConversation) activeConversation = true;
  fileStepIndex = 0;
  fileStepLocked = false;
  resultText = '';
  state = { formData: {}, files: {} };
  hideWaiting();
  const heroHTML = document.getElementById('heroSection').outerHTML;
  msgsEl().innerHTML = heroHTML;
  setTimeout(() => { showIntro(); }, 350);
}

function restartChat() {
  fullResetAndRestart();
}

function showIntro() {
  botMsg(
    "Kia ora. 👋🏾 I'm your friendly AI prompt generator. Select the task you'd like a standard prompt for.",
    ['Bid Writing', 'Something Else'],
    (choice) => {
      if (choice === 'Bid Writing') {
        setTimeout(() => showStep1(), 320);
      } else {
        setTimeout(() => {
          botMsg("Thanks for stopping by. We'll have more options available soon. 👋🏾").then(() => {
            const note = document.createElement('div');
            note.className = 'ended-note'; note.textContent = '— chat ended —';
            msgsEl().appendChild(note); scrollBot();
            activeConversation = false;
          });
        }, 280);
      }
    }
  );
}

function showStep1() {
  const body = createRow('bot');
  typeText("Let's start with the bid's main details.", body).then(() => {
    const form = document.createElement('div');
    form.className = 'form-block';
    form.innerHTML =
      '<div class="field-wrap"><label class="field-label">Our client name <span class="req">*</span></label><input type="text" id="f_our_client" autocomplete="off"></div>' +
      '<div class="field-wrap"><label class="field-label">Their client name <span class="req">*</span></label><input type="text" id="f_their_client" autocomplete="off"></div>' +
      '<div class="field-wrap"><label class="field-label">Project title <span class="req">*</span></label><input type="text" id="f_project_title" autocomplete="off"></div>' +
      '<button class="next-btn" id="step1NextBtn">Next</button>';
    body.appendChild(form);
    document.getElementById('step1NextBtn').addEventListener('click', submitStep1);
    scrollBot();
  });
}

function submitStep1() {
  const get = (id) => document.getElementById(id)?.value.trim() || '';
  if (!get('f_our_client') || !get('f_their_client') || !get('f_project_title')) {
    alert('Please fill in all required fields.');
    return;
  }
  state.formData.our_client_name = get('f_our_client');
  state.formData.their_client_name = get('f_their_client');
  state.formData.project_title = get('f_project_title');
  disableForms();
  setTimeout(() => showStep2(), 300);
}

function showStep2() {
  const body = createRow('bot');
  typeText("Great. Now let's add the response focus.", body).then(() => {
    const form = document.createElement('div');
    form.className = 'form-block';
    form.innerHTML =
      '<div class="field-wrap"><label class="field-label">What have you been tasked to support? (e.g., Executive Summary, Case Studies)</label><textarea id="f_non_price"></textarea></div>' +
      '<div class="field-wrap"><label class="field-label">Subject matter expertise (e.g., Road maintenance, bridge engineer)</label><textarea id="f_sme"></textarea></div>' +
      '<div class="field-wrap"><label class="field-label">Evaluation criteria (leave blank to use standard)</label><textarea id="f_eval_criteria"></textarea></div>' +
      '<div class="field-wrap"><label class="field-label">English variant</label><select id="f_english_variant"><option value="">Select one...</option><option value="New Zealand English">New Zealand English</option><option value="Australian English">Australian English</option></select></div>' +
      '<button class="next-btn" id="step2NextBtn">Next</button>';
    body.appendChild(form);
    document.getElementById('step2NextBtn').addEventListener('click', submitStep2);
    scrollBot();
  });
}

function submitStep2() {
  const getVal = (id) => document.getElementById(id)?.value || '';
  state.formData.non_price_attributes = getVal('f_non_price');
  state.formData.subject_matter_expertise = getVal('f_sme');
  state.formData.evaluation_criteria = getVal('f_eval_criteria');
  state.formData.english_variant = getVal('f_english_variant');
  disableForms();
  setTimeout(() => startFileUploads(), 300);
}

function startFileUploads() {
  fileStepIndex = 0;
  fileStepLocked = false;
  botMsg("Now upload the reference files. You can drag & drop them or click to upload. Select skip for the ones you don't have.").then(() => {
    setTimeout(() => askForFile(0), 280);
  });
}

function askForFile(idx) {
  if (idx >= FILE_STEPS.length) {
    showSubmitButton();
    return;
  }
  const step = FILE_STEPS[idx];
  const key = step.key;
  const body = createRow('bot');
  typeText(step.label, body).then(() => {
    const sub = document.createElement('div');
    sub.style.cssText = 'font-size:0.72rem;color:var(--text-muted);margin-top:-0.4rem;font-family:"DM Mono",monospace;';
    sub.textContent = `${idx+1} of ${FILE_STEPS.length}`;
    body.appendChild(sub);
    
    const fileInput = document.createElement('input');
    fileInput.type = 'file';
    fileInput.className = 'drop-file-input';
    fileInput.id = `fi_${key}`;
    
    const dz = document.createElement('div');
    dz.className = 'drop-zone';
    dz.id = `dz_${key}`;
    dz.innerHTML = `<div class="drop-zone-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg></div><div class="drop-zone-text"><span class="drop-zone-label">Drag & drop or click to upload</span><span class="drop-zone-sub">${idx+1} of ${FILE_STEPS.length}</span></div>`;
    
    dz.addEventListener('click', () => fileInput.click());
    fileInput.addEventListener('change', () => {
      if (fileInput.files && fileInput.files[0]) acceptFile(key, fileInput.files[0].name);
    });
    dz.addEventListener('dragover', (e) => { e.preventDefault(); dz.classList.add('dragging'); });
    dz.addEventListener('dragleave', () => dz.classList.remove('dragging'));
    dz.addEventListener('drop', (e) => {
      e.preventDefault();
      dz.classList.remove('dragging');
      const f = e.dataTransfer.files?.[0];
      if (f) acceptFile(key, f.name);
    });
    
    const selDiv = document.createElement('div');
    selDiv.id = `file_selected_${key}`;
    const skipBtn = document.createElement('button');
    skipBtn.className = 'skip-btn';
    skipBtn.id = `skip_${key}`;
    skipBtn.textContent = 'Skip';
    skipBtn.addEventListener('click', () => skipFile(key));
    
    body.appendChild(fileInput);
    body.appendChild(dz);
    body.appendChild(selDiv);
    body.appendChild(skipBtn);
    scrollBot();
  });
}

function acceptFile(key, filename) {
  if (fileStepLocked) return;
  fileStepLocked = true;
  state.files[key] = filename;
  const sel = document.getElementById(`file_selected_${key}`);
  if (sel) sel.innerHTML = `<div class="file-chosen"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>${escapeHtml(filename)}</div>`;
  lockCurrentStep(key);
  advanceFileStep();
}

function skipFile(key) {
  if (fileStepLocked) return;
  fileStepLocked = true;
  state.files[key] = '';
  lockCurrentStep(key);
  advanceFileStep();
}

function lockCurrentStep(key) {
  const dz = document.getElementById(`dz_${key}`);
  if (dz) dz.classList.add('locked');
  const sk = document.getElementById(`skip_${key}`);
  if (sk) sk.disabled = true;
}

function advanceFileStep() {
  fileStepIndex++;
  fileStepLocked = false;
  setTimeout(() => askForFile(fileStepIndex), 450);
}

function showSubmitButton() {
  const body = createRow('bot');
  typeText('All done! Generate your prompt.', body).then(() => {
    const btn = document.createElement('button');
    btn.className = 'next-btn';
    btn.textContent = 'Submit';
    btn.addEventListener('click', () => {
      btn.disabled = true;
      sendToWebhook();
    });
    body.appendChild(btn);
    scrollBot();
  });
}

function sendToWebhook() {
  botMsg('Creating prompt… ⏳').then(() => {
    showWaiting();
    const payload = Object.assign({}, state.formData, {
      rfp_filename: state.files['rfp'] || '',
      response_form_filename: state.files['response_form'] || '',
      specifications_filename: state.files['specs'] || '',
      win_themes_filename: state.files['win_themes'] || '',
      style_guide_filename: state.files['style_guide'] || ''
    });
    fetch(WEBHOOK_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    })
    .then(res => res.text())
    .then(text => {
      hideWaiting();
      resultText = text;
      showResult(text);
    })
    .catch(() => {
      hideWaiting();
      botMsg('Something went wrong. Please try again.');
    });
  });
}

function showResult(text) {
  const body = createRow('bot');
  const intro = document.createElement('div');
  intro.className = 'bubble';
  intro.textContent = "Here's your standard prompt";
  body.appendChild(intro);
  const wrap = document.createElement('div');
  wrap.className = 'result-wrap';
  const copyBtn = document.createElement('button');
  copyBtn.className = 'copy-btn';
  copyBtn.innerHTML = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>';
  copyBtn.addEventListener('click', () => {
    navigator.clipboard.writeText(resultText).then(() => {
      copyBtn.classList.add('ok');
      copyBtn.innerHTML = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>';
      setTimeout(() => {
        copyBtn.classList.remove('ok');
        copyBtn.innerHTML = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>';
      }, 1800);
    });
  });
  const content = document.createElement('div');
  content.textContent = text;
  wrap.appendChild(copyBtn);
  wrap.appendChild(content);
  body.appendChild(wrap);
  scrollBot();
  setTimeout(() => askRestart(), 750);
}

function askRestart() {
  botMsg("Like to start over?", ['Yes, start over', "No, I'm done"], (choice) => {
    if (choice === 'Yes, start over') {
      fullResetAndRestart();
    } else {
      botMsg("Ok, bye. 👋🏾").then(() => {
        const note = document.createElement('div');
        note.className = 'ended-note'; note.textContent = '— chat ended —';
        msgsEl().appendChild(note); scrollBot();
        activeConversation = false;
      });
    }
  });
}

function escapeHtml(str) { return str.replace(/[&<>]/g, function(m){if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }

let dragCtr = 0;
document.addEventListener('dragenter', (e) => { if(e.dataTransfer?.types.includes('Files')){ dragCtr++; document.getElementById('dragOverlay').classList.add('active'); } });
document.addEventListener('dragleave', () => { dragCtr--; if(dragCtr<=0) document.getElementById('dragOverlay').classList.remove('active'); });
document.addEventListener('drop', () => { dragCtr=0; document.getElementById('dragOverlay').classList.remove('active'); });
document.addEventListener('dragover', e => e.preventDefault());

window.restartChat = restartChat;
document.getElementById('globalRestartBtn').addEventListener('click', () => fullResetAndRestart());

let HERO_HTML = '';
window.addEventListener('DOMContentLoaded', () => {
  HERO_HTML = document.getElementById('heroSection').outerHTML;
  setTimeout(() => showIntro(), 500);
});
</script>
</body>
</html>
