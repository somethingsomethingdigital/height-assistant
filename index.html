<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Height AI Assistant</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f7f6f3;
      --surface: #ffffff;
      --border: #e4e2dd;
      --text: #1a1916;
      --text-muted: #9a9790;
      --accent: #1a1916;
      --accent-light: #f0ede8;
      --robot: #499281;
    }

    html, body {
      height: 100%;
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 1rem;
    }
    .app {
      display: flex;
      flex-direction: column;
      width: 420px;
      height: 820px;
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      background: var(--surface);
    }
    @media (max-width: 520px) {
      body { padding: 0; align-items: stretch; }
      .app { width: 100%; height: 100dvh; border-radius: 0; border: none; box-shadow: none; }
    }

    /* HEADER */
    .header {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 0.65rem;
      padding: 0.75rem 1.25rem;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }
    .logo-wrap {
      width: 28px; height: 28px;
      border-radius: 5px;
      overflow: hidden;
      display: flex; align-items: center; justify-content: center;
      background: #ffffff;
      border: 1px solid var(--border);
      flex-shrink: 0;
    }
    .logo-wrap img { width: 100%; height: 100%; object-fit: contain; display: block; }
    .header-divider { width: 1px; height: 18px; background: var(--border); }
    .header-strip-title { font-size: 0.78rem; font-weight: 400; color: var(--text-muted); }
    .restart-btn {
      margin-left: auto;
      background: transparent; border: none;
      width: 28px; height: 28px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      color: var(--text-muted); cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }
    .restart-btn:hover { background: var(--accent-light); color: var(--text); }
    .restart-btn svg { width: 15px; height: 15px; }

    /* HERO */
    .hero {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
      padding: 1.75rem 1.25rem 1.25rem;
      background: var(--surface);
    }
    .hero-icon {
      width: 64px; height: 64px;
      background: var(--robot);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .hero-icon svg { width: 42px; height: 42px; }
    .hero-title { font-size: 1rem; font-weight: 500; color: var(--text); letter-spacing: -0.01em; margin-top: 0.2rem; }
    .hero-subtitle { font-size: 0.75rem; color: var(--text-muted); font-weight: 300; text-align: center; max-width: 280px; line-height: 1.5; }

    /* MESSAGES */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 1.5rem 1.25rem 1rem;
      display: flex;
      flex-direction: column;
      gap: 1.75rem;
      scroll-behavior: smooth;
    }
    .messages::-webkit-scrollbar { width: 4px; }
    .messages::-webkit-scrollbar-track { background: transparent; }
    .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .message-row {
      display: flex;
      gap: 1rem;
      width: 100%;
      animation: fadeUp 0.2s ease forwards;
      opacity: 0;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(5px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .avatar {
      width: 30px; height: 30px; border-radius: 50%;
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.6rem; font-weight: 500; margin-top: 2px;
    }
    .avatar.bot { background: var(--robot); }
    .avatar.bot svg { width: 18px; height: 18px; }

    .message-body { flex: 1; display: flex; flex-direction: column; gap: 0.65rem; }

    .bubble { font-size: 0.93rem; line-height: 1.7; color: var(--text); }
    .bubble.typing::after {
      content: '▋';
      display: inline-block;
      font-size: 0.78em;
      vertical-align: middle;
      margin-left: 1px;
      animation: blink 0.65s step-start infinite;
    }
    @keyframes blink { 50% { opacity: 0; } }

    /* FORM */
    .form-block { display: flex; flex-direction: column; gap: 0.75rem; margin-top: 0.25rem; }
    .field-wrap { display: flex; flex-direction: column; gap: 0.3rem; }
    .field-label { font-size: 0.88rem; color: #3a3834; font-weight: 500; }
    .field-label .req { color: #c0392b; margin-left: 2px; }

    input[type="text"], textarea {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.55rem 0.8rem;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.88rem;
      outline: none;
      transition: border-color 0.15s;
    }
    input[type="text"]:focus, textarea:focus { border-color: #aaa9a5; }
    textarea { resize: vertical; min-height: 68px; }

    .next-btn {
      background: #499281; color: #fff; border: none;
      border-radius: 999px; padding: 0.5rem 1.4rem;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.85rem; font-weight: 500;
      cursor: pointer; transition: opacity 0.15s;
      align-self: flex-start; margin-top: 0.15rem;
    }
    .next-btn:hover { opacity: 0.75; }
    .next-btn:disabled { opacity: 0.3; cursor: not-allowed; }

    /* OPTION BUTTONS */
    .buttons-row { display: flex; flex-wrap: wrap; gap: 0.4rem; }
    .option-btn {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 0.45rem 1rem;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.82rem;
      color: var(--text);
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }
    .option-btn:hover { background: var(--accent-light); border-color: #499281; }
    .option-btn:disabled { opacity: 0.35; cursor: default; pointer-events: none; }

    /* FILE UPLOAD */
    .drop-zone {
      border: 1px dashed var(--border);
      border-radius: 10px;
      padding: 0.65rem 0.9rem;
      display: flex; align-items: center; gap: 0.75rem;
      cursor: pointer;
      transition: all 0.18s;
      background: var(--bg);
      margin-top: 0.1rem;
    }
    .drop-zone:hover, .drop-zone.dragging { border-color: var(--accent); background: var(--accent-light); }
    .drop-zone-icon { color: var(--text-muted); flex-shrink: 0; }
    .drop-zone-text { display: flex; flex-direction: column; gap: 1px; }
    .drop-zone-label { font-size: 0.83rem; color: var(--text); font-weight: 400; }
    .drop-zone-sub { font-size: 0.72rem; color: var(--text-muted); }
    .drop-file-input { display: none; }
    .file-chosen {
      display: flex; align-items: center; gap: 0.5rem;
      background: var(--accent-light);
      border: 1px solid var(--border);
      border-radius: 8px; padding: 0.45rem 0.75rem;
      margin-top: 0.4rem; font-size: 0.8rem;
      color: var(--text); font-weight: 400;
    }
    .skip-btn {
      background: none; border: none; color: var(--text-muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.78rem; cursor: pointer;
      text-decoration: underline; text-underline-offset: 2px;
      padding: 0.2rem 0; margin-top: 0.3rem; display: inline-block;
    }
    .skip-btn:hover { color: var(--text); }
    .skip-btn:disabled { opacity: 0.3; cursor: default; }

    /* RESULT */
    .result-wrap {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0.85rem 0.85rem 2.6rem 0.85rem;
      font-family: 'DM Mono', monospace;
      font-size: 0.78rem; white-space: pre-wrap;
      color: var(--text); line-height: 1.75;
      margin-top: 0.4rem; position: relative;
    }
    .copy-btn {
      position: absolute; bottom: 8px; right: 8px;
      background: var(--surface); border: 1px solid var(--border);
      color: var(--text-muted); border-radius: 6px;
      width: 26px; height: 26px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.15s;
    }
    .copy-btn:hover { background: var(--accent-light); color: var(--text); }
    .copy-btn.ok { color: #499281; border-color: #499281; }

    /* TYPING DOTS */
    .typing-dots { display: flex; gap: 4px; align-items: center; padding: 4px 0; }
    .typing-dot { width: 5px; height: 5px; background: var(--text-muted); border-radius: 50%; animation: tdBounce 1.2s infinite; }
    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes tdBounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-4px)} }

    /* DRAG OVERLAY */
    #dragOverlay {
      display: none; position: fixed; inset: 0;
      background: rgba(240,237,232,0.75);
      border: 2px dashed var(--accent);
      z-index: 999; pointer-events: none;
      align-items: center; justify-content: center;
      flex-direction: column; gap: 0.6rem;
    }
    #dragOverlay.active { display: flex; }
    #dragOverlay p { font-size: 0.9rem; color: var(--accent); font-weight: 500; }

    /* FOOTER */
    .footer {
      flex-shrink: 0;
      padding: 0.75rem 1.25rem 1rem;
      background: var(--bg);
      border-top: 1px solid var(--border);
    }
    .powered-by-text {
      text-align: center;
      display: block;
      font-size: 0.68rem;
      color: var(--text-muted);
    }
    .powered-by-text a { color: var(--text-muted); text-decoration: none; }
    .powered-by-text a:hover { color: var(--text); text-decoration: underline; }

    .ended-note {
      text-align: center; color: var(--text-muted);
      font-size: 0.72rem; padding: 0.5rem 0;
      font-family: 'DM Mono', monospace;
    }
  </style>
</head>
<body>

<div id="dragOverlay">
  <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#1a1916" stroke-width="1.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
  <p>Drop your file here</p>
</div>

<div class="app">

  <header class="header">
    <div class="logo-wrap">
      <img src="https://i.ibb.co/Ft3wdgQ/Group-12.png" alt="Height">
    </div>
    <button class="restart-btn" onclick="restartChat()" title="Restart">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
        <path d="M3 3v5h5"/>
      </svg>
    </button>
  </header>

  <div class="messages" id="messages">
    <div class="hero" id="heroSection">
      <div class="hero-icon">
        <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
          <line x1="32" y1="6" x2="32" y2="14" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
          <circle cx="32" cy="5" r="2.5" fill="white"/>
          <rect x="14" y="14" width="36" height="26" rx="7" fill="white"/>
          <circle cx="24" cy="25" r="4" fill="#499281"/>
          <circle cx="40" cy="25" r="4" fill="#499281"/>
          <circle cx="25.5" cy="23.5" r="1.2" fill="white"/>
          <circle cx="41.5" cy="23.5" r="1.2" fill="white"/>
          <path d="M24 33 Q32 38 40 33" stroke="#499281" stroke-width="2" stroke-linecap="round" fill="none"/>
          <rect x="9" y="20" width="5" height="10" rx="2.5" fill="white"/>
          <rect x="50" y="20" width="5" height="10" rx="2.5" fill="white"/>
          <rect x="20" y="42" width="24" height="16" rx="5" fill="white" opacity="0.85"/>
          <circle cx="27" cy="50" r="2.5" fill="#499281" opacity="0.5"/>
          <circle cx="37" cy="50" r="2.5" fill="#499281" opacity="0.5"/>
        </svg>
      </div>
      <span class="hero-title">Height Assistant</span>
      <span class="hero-subtitle">Provide information about your bid to receive a standard prompt for use in ChatGPT projects.</span>
    </div>
  </div>

  <footer class="footer">
    <span class="powered-by-text">Powered by <a href="https://www.somethingsomething.digital" target="_blank" rel="noopener">Something Something Digital</a></span>
  </footer>

</div>

<script>
const WEBHOOK_URL = 'https://hook.us1.make.com/431zm5huyqdtadg15wpiw5hmuyw5csiu';

let state = { formData: {}, files: {} };
const FILE_KEYS   = ['rfp', 'response_form', 'specs', 'win_themes', 'style_guide'];
const FILE_LABELS = { rfp:'RFP', response_form:'Response Form', specs:'Specifications', win_themes:'Win Themes', style_guide:'Style Guide' };
let fileStepIndex = 0;
let resultText = '';

const msgsEl    = () => document.getElementById('messages');
const scrollBot = () => setTimeout(() => { const m = msgsEl(); m.scrollTop = m.scrollHeight; }, 60);

/* ── ROBOT SVG ── */
function robotSVG() {
  return `<svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
    <line x1="32" y1="6" x2="32" y2="14" stroke="white" stroke-width="3" stroke-linecap="round"/>
    <circle cx="32" cy="5" r="3" fill="white"/>
    <rect x="14" y="14" width="36" height="26" rx="7" fill="white"/>
    <circle cx="24" cy="25" r="4" fill="#499281"/>
    <circle cx="40" cy="25" r="4" fill="#499281"/>
    <circle cx="25.5" cy="23.5" r="1.2" fill="white"/>
    <circle cx="41.5" cy="23.5" r="1.2" fill="white"/>
    <path d="M24 33 Q32 38 40 33" stroke="#499281" stroke-width="2" stroke-linecap="round" fill="none"/>
    <rect x="9" y="20" width="5" height="10" rx="2.5" fill="white"/>
    <rect x="50" y="20" width="5" height="10" rx="2.5" fill="white"/>
  </svg>`;
}

/* ── ROW BUILDER ── */
function createRow(sender) {
  const row = document.createElement('div');
  row.className = 'message-row ' + sender;
  const av = document.createElement('div');
  av.className = 'avatar ' + sender;
  if (sender === 'bot') av.innerHTML = robotSVG();
  row.appendChild(av);
  const body = document.createElement('div');
  body.className = 'message-body';
  row.appendChild(body);
  msgsEl().appendChild(row);
  scrollBot();
  return body;
}

/* ── TYPEWRITER ── */
function typeText(text, body, speed) {
  speed = speed || 18;
  return new Promise(function(resolve) {
    const bubble = document.createElement('div');
    bubble.className = 'bubble typing';
    body.appendChild(bubble);
    scrollBot();
    let i = 0;
    const iv = setInterval(function() {
      bubble.textContent = text.slice(0, ++i);
      scrollBot();
      if (i >= text.length) {
        clearInterval(iv);
        bubble.classList.remove('typing');
        resolve(bubble);
      }
    }, speed);
  });
}

/* ── OPTION BUTTONS ── */
function addButtons(body, options, onSelect) {
  const row = document.createElement('div');
  row.className = 'buttons-row';
  options.forEach(function(opt) {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.textContent = opt;
    btn.onclick = function() {
      row.querySelectorAll('.option-btn').forEach(function(b) { b.disabled = true; });
      onSelect(opt);
    };
    row.appendChild(btn);
  });
  body.appendChild(row);
  scrollBot();
}

function botMsg(text, options, onSelect) {
  const body = createRow('bot');
  return typeText(text, body).then(function() {
    if (options && options.length) addButtons(body, options, onSelect);
    scrollBot();
    return body;
  });
}

/* ── TYPING DOTS ── */
let waitRow = null;
function showWaiting() {
  const body = createRow('bot');
  waitRow = body.parentElement;
  const dots = document.createElement('div');
  dots.className = 'typing-dots';
  dots.innerHTML = '<div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>';
  body.appendChild(dots); scrollBot();
}
function hideWaiting() { if (waitRow) { waitRow.remove(); waitRow = null; } }

/* ── DISABLE PAST FORMS ── */
function disableForms() {
  msgsEl().querySelectorAll('input, textarea, .next-btn').forEach(function(el) { el.disabled = true; });
}

/* ── INTRO ── */
function showIntro() {
  botMsg(
    "Kia ora. I'm your AI prompt generator. Select the task you'd like a standard AI prompt for.",
    ['Bid Writing', 'Something Else'],
    handleTaskChoice
  );
}

function handleTaskChoice(choice) {
  if (choice === 'Bid Writing') {
    setTimeout(showStep1, 350);
  } else {
    setTimeout(function() {
      botMsg("Thanks for stopping by. We'll have more options available soon. \uD83D\uDC4B\uD83C\uDFFE").then(function() {
        const note = document.createElement('div');
        note.className = 'ended-note'; note.textContent = '— chat ended —';
        msgsEl().appendChild(note); scrollBot();
      });
    }, 300);
  }
}

/* ── STEP 1: CORE PROJECT DETAILS ── */
function showStep1() {
  const body = createRow('bot');
  typeText("Let's start with the bid's main details.", body).then(function() {
    const form = document.createElement('div');
    form.className = 'form-block';
    form.innerHTML =
      '<div class="field-wrap">' +
        '<label class="field-label">Our client name <span class="req">*</span></label>' +
        '<input type="text" id="f_our_client">' +
      '</div>' +
      '<div class="field-wrap">' +
        '<label class="field-label">Their client name <span class="req">*</span></label>' +
        '<input type="text" id="f_their_client">' +
      '</div>' +
      '<div class="field-wrap">' +
        '<label class="field-label">Project title <span class="req">*</span></label>' +
        '<input type="text" id="f_project_title">' +
      '</div>' +
      '<button class="next-btn" onclick="submitStep1()">Next</button>';
    body.appendChild(form);
    scrollBot();
  });
}

function submitStep1() {
  const g = function(id) { const el = document.getElementById(id); return el ? el.value : ''; };
  const req = [
    {id:'f_our_client',    label:'Our client name'},
    {id:'f_their_client',  label:'Their client name'},
    {id:'f_project_title', label:'Project title'}
  ];
  for (let r of req) {
    if (!g(r.id).trim()) { alert('Please fill in: ' + r.label); document.getElementById(r.id).focus(); return; }
  }
  Object.assign(state.formData, {
    our_client_name:   g('f_our_client'),
    their_client_name: g('f_their_client'),
    project_title:     g('f_project_title')
  });
  disableForms();
  setTimeout(showStep2, 350);
}

/* ── STEP 2: RESPONSE FOCUS ── */
function showStep2() {
  const body = createRow('bot');
  typeText('Great. Now the response focus.', body).then(function() {
    const form = document.createElement('div');
    form.className = 'form-block';
    form.innerHTML =
      '<div class="field-wrap">' +
        '<label class="field-label">Non-price attributes, especially Section 3</label>' +
        '<textarea id="f_non_price"></textarea>' +
      '</div>' +
      '<div class="field-wrap">' +
        '<label class="field-label">Subject-matter expertise</label>' +
        '<input type="text" id="f_sme">' +
      '</div>' +
      '<button class="next-btn" onclick="submitStep2()">Next</button>';
    body.appendChild(form);
    scrollBot();
  });
}

function submitStep2() {
  const g = function(id) { const el = document.getElementById(id); return el ? el.value : ''; };
  Object.assign(state.formData, {
    non_price_attributes:     g('f_non_price'),
    subject_matter_expertise: g('f_sme')
  });
  disableForms();
  setTimeout(showStep3, 350);
}

/* ── STEP 3: NAMING & STYLE ── */
function showStep3() {
  const body = createRow('bot');
  typeText('Almost there \u2014 naming and style.', body).then(function() {
    const form = document.createElement('div');
    form.className = 'form-block';
    form.innerHTML =
      '<div class="field-wrap">' +
        '<label class="field-label">Our client (possessive form)</label>' +
        '<input type="text" id="f_our_poss">' +
      '</div>' +
      '<div class="field-wrap">' +
        '<label class="field-label">Their client (possessive form)</label>' +
        '<input type="text" id="f_their_poss">' +
      '</div>' +
      '<div class="field-wrap">' +
        '<label class="field-label">Client writing style guide reference</label>' +
        '<input type="text" id="f_style_ref">' +
      '</div>' +
      '<button class="next-btn" onclick="submitStep3()">Next</button>';
    body.appendChild(form);
    scrollBot();
  });
}

function submitStep3() {
  const g = function(id) { const el = document.getElementById(id); return el ? el.value : ''; };
  Object.assign(state.formData, {
    our_client_possessive:   g('f_our_poss'),
    their_client_possessive: g('f_their_poss'),
    style_guide_reference:   g('f_style_ref')
  });
  disableForms();
  setTimeout(startFileUploads, 350);
}

/* ── FILE UPLOADS ── */
function startFileUploads() {
  botMsg('Now upload the reference files. You can drag & drop them or click to upload. Select skip for any you don\'t have.').then(function() {
    setTimeout(function() { askForFile(0); }, 300);
  });
}

function askForFile(idx) {
  if (idx >= FILE_KEYS.length) {
    showSubmitButton();
    return;
  }
  const key   = FILE_KEYS[idx];
  const label = FILE_LABELS[key];
  const num   = idx + 1;

  const body = createRow('bot');
  typeText('Upload ' + label, body).then(function() {
    const sub = document.createElement('div');
    sub.style.cssText = 'font-size:0.72rem;color:var(--text-muted);margin-top:-0.4rem;font-family:"DM Mono",monospace;';
    sub.textContent = num + ' of ' + FILE_KEYS.length;
    body.appendChild(sub);
    const wrap = document.createElement('div');
    wrap.innerHTML =
      '<div class="drop-zone" id="dz_' + key + '" onclick="document.getElementById(\'fi_' + key + '\').click()">' +
        '<input type="file" class="drop-file-input" id="fi_' + key + '" onchange="handleFilePick(\'' + key + '\',this)">' +
        '<div class="drop-zone-icon">' +
          '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">' +
            '<path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>' +
            '<polyline points="17 8 12 3 7 8"/>' +
            '<line x1="12" y1="3" x2="12" y2="15"/>' +
          '</svg>' +
        '</div>' +
        '<div class="drop-zone-text">' +
          '<span class="drop-zone-label">Drag &amp; drop or click to upload</span>' +
          '<span class="drop-zone-sub">' + num + ' of ' + FILE_KEYS.length + '</span>' +
        '</div>' +
      '</div>' +
      '<div id="file_selected_' + key + '"></div>' +
      '<button class="skip-btn" id="skip_' + key + '" onclick="skipFile(\'' + key + '\')">Skip</button>';
    body.appendChild(wrap);
    scrollBot();
    setupDZ(key);
  });
}

/* Show Submit button after all file prompts */
function showSubmitButton() {
  const body = createRow('bot');
  typeText("Generate your prompt.", body).then(function() {
    const btn = document.createElement('button');
    btn.className = 'next-btn';
    btn.textContent = 'Submit';
    btn.id = 'finalSubmitBtn';
    btn.onclick = function() {
      btn.disabled = true;
      sendToWebhook();
    };
    body.appendChild(btn);
    scrollBot();
  });
}

function setupDZ(key) {
  const dz = document.getElementById('dz_' + key); if (!dz) return;
  dz.addEventListener('dragover',  function(e) { e.preventDefault(); dz.classList.add('dragging'); });
  dz.addEventListener('dragleave', function()  { dz.classList.remove('dragging'); });
  dz.addEventListener('drop', function(e) {
    e.preventDefault(); dz.classList.remove('dragging');
    const f = e.dataTransfer.files[0]; if (f) acceptFile(key, f);
  });
}

function handleFilePick(key, inp) { const f = inp.files[0]; if (f) acceptFile(key, f); }

function acceptFile(key, file) {
  state.files[key] = file.name;
  const sel = document.getElementById('file_selected_' + key);
  if (sel) sel.innerHTML =
    '<div class="file-chosen">' +
      '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>' +
      file.name +
    '</div>';
  lockDZ(key);
  setTimeout(function() { fileStepIndex++; askForFile(fileStepIndex); }, 500);
}

function skipFile(key) {
  state.files[key] = '';
  lockDZ(key);
  setTimeout(function() { fileStepIndex++; askForFile(fileStepIndex); }, 380);
}

function lockDZ(key) {
  const dz = document.getElementById('dz_' + key);
  if (dz) { dz.style.pointerEvents = 'none'; dz.style.opacity = '0.4'; }
  const sk = document.getElementById('skip_' + key);
  if (sk) sk.disabled = true;
}

/* ── GLOBAL DRAG OVERLAY ── */
let dragCtr = 0;
document.addEventListener('dragenter', function(e) {
  if (e.dataTransfer.types.includes('Files')) { dragCtr++; document.getElementById('dragOverlay').classList.add('active'); }
});
document.addEventListener('dragleave', function() {
  dragCtr--; if (dragCtr <= 0) { dragCtr = 0; document.getElementById('dragOverlay').classList.remove('active'); }
});
document.addEventListener('drop',     function(e) { dragCtr = 0; document.getElementById('dragOverlay').classList.remove('active'); e.preventDefault(); });
document.addEventListener('dragover', function(e) { e.preventDefault(); });

/* ── WEBHOOK ── */
function sendToWebhook() {
  showWaiting();
  const payload = Object.assign({}, state.formData, {
    rfp_filename:            state.files['rfp']           || '',
    response_form_filename:  state.files['response_form'] || '',
    specifications_filename: state.files['specs']         || '',
    win_themes_filename:     state.files['win_themes']    || '',
    style_guide_filename:    state.files['style_guide']   || ''
  });
  fetch(WEBHOOK_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(payload)
  })
  .then(function(res) { return res.text(); })
  .then(function(text) {
    hideWaiting();
    resultText = text;
    showResult(text);
  })
  .catch(function(err) {
    hideWaiting();
    botMsg('Something went wrong. Please try again.');
  });
}

/* ── RESULT ── */
function showResult(text) {
  const body = createRow('bot');
  const intro = document.createElement('div');
  intro.className = 'bubble';
  intro.textContent = "Here's your proposal response:";
  body.appendChild(intro);

  const wrap = document.createElement('div');
  wrap.className = 'result-wrap';

  const copyBtn = document.createElement('button');
  copyBtn.className = 'copy-btn';
  copyBtn.id = 'copyBtn';
  copyBtn.title = 'Copy to clipboard';
  copyBtn.innerHTML = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>';
  copyBtn.addEventListener('click', function() {
    navigator.clipboard.writeText(resultText).then(function() {
      copyBtn.classList.add('ok');
      copyBtn.innerHTML = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>';
      setTimeout(function() {
        copyBtn.classList.remove('ok');
        copyBtn.innerHTML = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>';
      }, 2000);
    });
  });

  const content = document.createElement('div');
  content.textContent = text;

  wrap.appendChild(copyBtn);
  wrap.appendChild(content);
  body.appendChild(wrap);
  scrollBot();
  setTimeout(askRestart, 700);
}

/* ── RESTART ── */
function askRestart() {
  botMsg('Like to start over?', ['Yes, start over', "No, I'm done"], handleRestart);
}

function handleRestart(choice) {
  if (choice === 'Yes, start over') {
    setTimeout(function() {
      botMsg("Sure! Let's go again.").then(function() { setTimeout(showIntro, 450); });
    }, 300);
  } else {
    setTimeout(function() {
      botMsg('Ok, bye. \uD83D\uDC4B\uD83C\uDFFE').then(function() {
        const note = document.createElement('div');
        note.className = 'ended-note'; note.textContent = '— chat ended —';
        msgsEl().appendChild(note); scrollBot();
      });
    }, 300);
  }
}

/* ── BOOT ── */
const HERO_HTML = document.getElementById('heroSection').outerHTML;

function restartChat() {
  state = { formData:{}, files:{} };
  fileStepIndex = 0;
  resultText = '';
  msgsEl().innerHTML = HERO_HTML;
  setTimeout(showIntro, 400);
}

window.addEventListener('DOMContentLoaded', function() { setTimeout(showIntro, 600); });
</script>
</body>
</html>
